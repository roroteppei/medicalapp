let questions=[], idx=0, score=0, answered=false;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(){questions=shuffle(rawQuestions.map(x=>({...x})));idx=0;score=0;showQ()}
function showQ(){answered=false;const q=questions[idx];document.getElementById('bar').style.width=((idx)/questions.length*100)+'%';document.getElementById('count').textContent=`${idx+1} / ${questions.length}`;document.getElementById('scoreNow').textContent=`正答 ${score}`;document.getElementById('category').textContent=q.cat;document.getElementById('question').textContent=q.q;const choices=q.choices.map((t,i)=>({t,correct:i===q.answer}));shuffle(choices);const box=document.getElementById('choices');box.innerHTML='';choices.forEach(c=>{const b=document.createElement('button');b.className='choice';b.textContent=c.t;b.onclick=()=>select(b,c.correct);box.appendChild(b)});document.getElementById('explain').style.display='none';document.getElementById('explain').innerHTML='';document.getElementById('nextBtn').style.display='none'}
function select(btn,correct){if(answered)return;answered=true;if(correct){score++;btn.classList.add('correct')}else{btn.classList.add('wrong');[...document.querySelectorAll('.choice')].forEach(b=>{const q=questions[idx]; if(b.textContent===q.choices[q.answer]) b.classList.add('correct')})}const q=questions[idx];const exp=document.getElementById('explain');exp.innerHTML=`<b>${correct?'正解です。':'不正解です。'}</b><br>${q.ex}`;exp.style.display='block';document.getElementById('scoreNow').textContent=`正答 ${score}`;document.getElementById('nextBtn').style.display='inline-block'}
document.getElementById('nextBtn').onclick=()=>{idx++; if(idx>=questions.length){finish()}else showQ()};
document.getElementById('restartBtn').onclick=start;
function finish(){document.getElementById('bar').style.width='100%';document.getElementById('quiz').innerHTML=`<div class="result"><h2>終了です</h2><div class="score">${score} / ${questions.length}</div><p>${score>=45?'かなり良い理解です。臨床実務レベルで用語と流れを整理できています。':score>=35?'基礎は十分です。Practice Model と業務範囲を再確認しましょう。':'重要語句をもう一度確認しましょう。特にVTNE、Practice Model、業務範囲が得点源です。'}</p><button class="primary" onclick="location.reload()">もう一度挑戦</button></div>`}
start();
