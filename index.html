<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>認知的不協和クイズ50問</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --ok: #16a34a;
      --ng: #dc2626;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 40%, #f8fafc 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      width: min(920px, calc(100% - 24px));
      margin: 24px auto 60px;
    }
    .hero, .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 28px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -50px;
      top: -50px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, rgba(37,99,235,0) 70%);
    }
    h1 { margin: 0 0 10px; font-size: clamp(1.7rem, 3vw, 2.3rem); }
    .lead { margin: 0; color: var(--muted); line-height: 1.8; }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .badge {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.92rem;
      font-weight: 700;
    }
    .card { padding: 24px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .progress-wrap { flex: 1 1 280px; }
    .progress-label { font-size: 0.95rem; color: var(--muted); margin-bottom: 8px; }
    .progress {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      transition: width 0.35s ease;
    }
    .scorebox {
      padding: 12px 16px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid var(--border);
      min-width: 180px;
    }
    .scorebox strong { display: block; font-size: 1rem; }
    .question-no { color: var(--accent); font-weight: 800; margin-bottom: 10px; }
    .question-text {
      font-size: clamp(1.15rem, 2.2vw, 1.45rem);
      font-weight: 800;
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .choices { display: grid; gap: 12px; }
    .choice {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 16px 18px;
      border-radius: 16px;
      font-size: 1rem;
      line-height: 1.6;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }
    .choice:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #bfdbfe;
      box-shadow: 0 8px 18px rgba(37,99,235,0.08);
    }
    .choice:disabled { cursor: default; }
    .choice.correct {
      border-color: rgba(22,163,74,0.45);
      background: rgba(22,163,74,0.08);
    }
    .choice.wrong {
      border-color: rgba(220,38,38,0.4);
      background: rgba(220,38,38,0.08);
    }
    .feedback {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #f8fafc;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct { border-color: rgba(22,163,74,0.3); background: rgba(22,163,74,0.08); }
    .feedback.wrong { border-color: rgba(220,38,38,0.3); background: rgba(220,38,38,0.08); }
    .feedback h2 {
      margin: 0 0 10px;
      font-size: 1.12rem;
    }
    .feedback p {
      margin: 8px 0;
      line-height: 1.85;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }
    .btn.primary { background: var(--accent); color: white; }
    .btn.secondary { background: #e5e7eb; color: #111827; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: #111827; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .result {
      text-align: center;
      display: none;
      padding: 12px 6px 4px;
    }
    .result.show { display: block; }
    .result h2 { font-size: clamp(1.6rem, 3vw, 2rem); margin: 0 0 12px; }
    .big-score {
      font-size: clamp(2.3rem, 6vw, 4rem);
      font-weight: 900;
      color: var(--accent);
      margin: 12px 0;
    }
    .summary {
      margin: 0 auto 18px;
      max-width: 680px;
      line-height: 1.9;
      color: var(--muted);
    }
    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.7;
    }
    #petals, #rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 20;
    }
    .petal, .drop {
      position: absolute;
      top: -10vh;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }
    .petal {
      width: 14px;
      height: 10px;
      background: #f9a8d4;
      border-radius: 12px 2px 12px 2px;
      opacity: 0.85;
      animation-name: fallPetal;
    }
    .drop {
      width: 2px;
      height: 22px;
      background: linear-gradient(180deg, rgba(59,130,246,0.1), rgba(59,130,246,0.65));
      border-radius: 999px;
      animation-name: fallRain;
    }
    @keyframes fallPetal {
      to {
        transform: translate3d(var(--dx), 110vh, 0) rotate(560deg);
        opacity: 0.2;
      }
    }
    @keyframes fallRain {
      to {
        transform: translate3d(var(--dx), 110vh, 0);
        opacity: 0.25;
      }
    }
    @media (max-width: 640px) {
      .hero, .card { padding: 18px; border-radius: 18px; }
      .choice { padding: 14px; }
      .actions { flex-direction: column; }
      .actions .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="petals"></div>
  <div id="rain"></div>
  <div class="container">
    <section class="hero">
      <h1>認知的不協和クイズ 50問</h1>
      <p class="lead">
        フェスティンガーの強制的承諾実験を中心に、認知的不協和の定義、外的正当化、内的正当化、態度変容、応用までを3択で確認する学習アプリです。
      </p>
      <div class="meta">
        <span class="badge">全50問</span>
        <span class="badge">3択</span>
        <span class="badge">解答＋解説つき</span>
        <span class="badge">スマホ対応</span>
      </div>
    </section>

    <section class="card">
      <div id="quizArea">
        <div class="topbar">
          <div class="progress-wrap">
            <div class="progress-label" id="progressLabel">進捗 0 / 50</div>
            <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
          </div>
          <div class="scorebox">
            <strong id="scoreText">正解 0 / 0</strong>
            <span id="rateText" class="lead">正答率 0%</span>
          </div>
        </div>

        <div class="question-no" id="questionNo"></div>
        <div class="question-text" id="questionText"></div>
        <div class="choices" id="choices"></div>

        <div class="feedback" id="feedback"></div>

        <div class="actions">
          <button class="btn ghost" id="restartBtn">最初からやり直す</button>
          <button class="btn primary" id="nextBtn" disabled>次の問題へ</button>
        </div>
      </div>

      <div class="result" id="resultArea">
        <h2>おつかれさまでした</h2>
        <div class="big-score" id="finalScore"></div>
        <p class="summary" id="summaryText"></p>
        <div class="actions" style="justify-content:center;">
          <button class="btn primary" id="retryBtn">もう一度解く</button>
        </div>
      </div>

      <p class="footer-note">
        この教材は、フェスティンガーの「つまらない作業を楽しいと伝えさせる」古典的実験の理解補助として作成されています。教育用途を想定した整理であり、厳密な論文抄訳ではありません。
      </p>
    </section>
  </div>

    let current = 0;
    let score = 0;
    let answered = false;

    const questionNo = document.getElementById('questionNo');
    const questionText = document.getElementById('questionText');
    const choicesEl = document.getElementById('choices');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const retryBtn = document.getElementById('retryBtn');
    const progressLabel = document.getElementById('progressLabel');
    const progressBar = document.getElementById('progressBar');
    const scoreText = document.getElementById('scoreText');
    const rateText = document.getElementById('rateText');
    const quizArea = document.getElementById('quizArea');
    const resultArea = document.getElementById('resultArea');
    const finalScore = document.getElementById('finalScore');
    const summaryText = document.getElementById('summaryText');

    function updateStats() {
      progressLabel.textContent = `進捗 ${Math.min(current + 1, questions.length)} / ${questions.length}`;
      const answeredCount = current;
      const rate = answeredCount === 0 ? 0 : Math.round((score / answeredCount) * 100);
      scoreText.textContent = `正解 ${score} / ${answeredCount}`;
      rateText.textContent = `正答率 ${rate}%`;
      progressBar.style.width = `${(current / questions.length) * 100}%`;
    }

    function renderQuestion() {
      const item = questions[current];
      answered = false;
      nextBtn.disabled = true;
      feedback.className = 'feedback';
      feedback.innerHTML = '';
      questionNo.textContent = `第 ${current + 1} 問`;
      questionText.textContent = item.q;
      progressLabel.textContent = `進捗 ${current + 1} / ${questions.length}`;
      progressBar.style.width = `${(current / questions.length) * 100}%`;
      choicesEl.innerHTML = '';

      item.choices.forEach((choice, idx) => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.innerHTML = `<strong>${String.fromCharCode(65 + idx)}.</strong> ${choice}`;
        btn.addEventListener('click', () => selectAnswer(idx));
        choicesEl.appendChild(btn);
      });
      updateStats();
    }

    function selectAnswer(index) {
      if (answered) return;
      answered = true;
      const item = questions[current];
      const buttons = [...document.querySelectorAll('.choice')];

      buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === item.answer) btn.classList.add('correct');
        if (idx === index && idx !== item.answer) btn.classList.add('wrong');
      });

      const correct = index === item.answer;
      if (correct) {
        score += 1;
        playCorrectSound();
        launchPetals();
      } else {
        playWrongSound();
        launchRain();
      }

      feedback.className = `feedback show ${correct ? 'correct' : 'wrong'}`;
      feedback.innerHTML = `
        <h2>${correct ? '正解です' : '不正解です'}</h2>
        <p><strong>解答：</strong>${String.fromCharCode(65 + item.answer)}. ${item.choices[item.answer]}</p>
        <p><strong>解説：</strong>${item.explanation}</p>
      `;

      const answeredCount = current + 1;
      const rate = Math.round((score / answeredCount) * 100);
      scoreText.textContent = `正解 ${score} / ${answeredCount}`;
      rateText.textContent = `正答率 ${rate}%`;
      progressBar.style.width = `${(answeredCount / questions.length) * 100}%`;
      nextBtn.disabled = false;
      nextBtn.textContent = current === questions.length - 1 ? '結果を見る' : '次の問題へ';
    }

    function nextQuestion() {
      if (!answered) return;
      current += 1;
      if (current >= questions.length) {
        showResult();
        return;
      }
      renderQuestion();
    }

    function showResult() {
      quizArea.style.display = 'none';
      resultArea.classList.add('show');
      const rate = Math.round((score / questions.length) * 100);
      finalScore.textContent = `${score} / ${questions.length} 問正解`;
      let comment = '';
      if (rate >= 90) {
        comment = '認知的不協和の理論構造、外的正当化と内的正当化、古典的実験の読解がかなり整理されています。教育・実務応用まで十分見通せる水準です。';
      } else if (rate >= 75) {
        comment = '主要概念はよく理解できています。とくに「なぜ低額報酬群のほうが態度変化しやすいのか」をもう一度確認すると、理解がさらに締まります。';
      } else if (rate >= 60) {
        comment = '基礎はつかめています。『不協和は状況ではなく認知の矛盾にある』『高額報酬は外的正当化になる』の2点を復習すると伸びます。';
      } else {
        comment = 'まずは、①つまらない作業 ②楽しいと話す ③低額報酬では外的理由が弱い、の3点を一直線で結び直すと理解しやすくなります。';
      }
      summaryText.textContent = `正答率 ${rate}%。${comment}`;
    }

    function resetQuiz() {
      current = 0;
      score = 0;
      answered = false;
      quizArea.style.display = 'block';
      resultArea.classList.remove('show');
      nextBtn.textContent = '次の問題へ';
      updateStats();
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function playTone(freq, duration, type='sine', volume=0.04) {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      const ctx = new AudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      osc.stop(ctx.currentTime + duration);
      setTimeout(() => ctx.close(), duration * 1000 + 120);
    }

    function playCorrectSound() {
      playTone(880, 0.12, 'triangle', 0.05);
      setTimeout(() => playTone(1174.66, 0.18, 'triangle', 0.05), 90);
    }

    function playWrongSound() {
      playTone(220, 0.16, 'sawtooth', 0.05);
      setTimeout(() => playTone(164.81, 0.22, 'sawtooth', 0.05), 110);
    }

    function launchPetals() {
      const wrap = document.getElementById('petals');
      for (let i = 0; i < 24; i++) {
        const el = document.createElement('span');
        el.className = 'petal';
        el.style.left = `${Math.random() * 100}vw`;
        el.style.animationDuration = `${2.6 + Math.random() * 1.8}s`;
        el.style.setProperty('--dx', `${-80 + Math.random() * 160}px`);
        el.style.opacity = `${0.55 + Math.random() * 0.35}`;
        wrap.appendChild(el);
        setTimeout(() => el.remove(), 4600);
      }
    }

    function launchRain() {
      const wrap = document.getElementById('rain');
      for (let i = 0; i < 32; i++) {
        const el = document.createElement('span');
        el.className = 'drop';
        el.style.left = `${Math.random() * 100}vw`;
        el.style.animationDuration = `${0.8 + Math.random() * 0.6}s`;
        el.style.setProperty('--dx', `${-30 + Math.random() * 30}px`);
        wrap.appendChild(el);
        setTimeout(() => el.remove(), 1800);
      }
    }

    nextBtn.addEventListener('click', nextQuestion);
    restartBtn.addEventListener('click', resetQuiz);
    retryBtn.addEventListener('click', resetQuiz);
